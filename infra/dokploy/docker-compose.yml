services:
  kitpot-node:
    build:
      context: ../..
      dockerfile: infra/dokploy/Dockerfile
      args:
        TARGETARCH: amd64
    env_file:
      - .env
    volumes:
      - minitia-data:/data/.minitia
      - opinit-data:/data/.opinit
      - kitpot-output:/data
    ports:
      - "8545:8545"
      - "8546:8546"
      - "26657:26657"
      - "1317:1317"
    restart: unless-stopped

volumes:
  minitia-data:
  opinit-data:
  kitpot-output:
